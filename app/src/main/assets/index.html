<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yasya Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        p {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active {
            transform: scale(0.96);
            background: #388E3C;
        }
        #score {
            font-size: 1.5rem;
            color: #FFD700;
            margin-top: 1.5rem;
            min-height: 2rem;
        }
    </style>
</head>
<body>
    <h1>Yasya Game</h1>
    <p>Добро пожаловать!</p>
    <button onclick="onTap()">Нажми меня</button>
    <div id="score"></div>

    <script>
        let count = 0;
        function onTap() {
            count++;
            document.getElementById('score').textContent = 'Счёт: ' + count;
        }
    </script>
</body>
</html>
